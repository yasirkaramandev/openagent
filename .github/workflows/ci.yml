name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Full lint + type-check + offline test suite + package build on Linux.
  test:
    name: test (ubuntu, py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (editable, with dev extras)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" build

      # A required gate (spec §8): the formatter baseline is enforced, not aspirational. ruff is
      # pinned exactly in [dev] so this can never fail merely because a new ruff shipped.
      - name: Ruff format check
        run: ruff format --check .

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy src

      - name: Pytest (offline suite — no API keys, no live CLIs)
        run: pytest -q

      - name: Build sdist + wheel
        run: python -m build

      - name: Install the built wheel in a clean venv and smoke the entrypoint
        run: |
          python -m venv /tmp/wheeltest
          /tmp/wheeltest/bin/python -m pip install --upgrade pip
          /tmp/wheeltest/bin/pip install dist/*.whl
          /tmp/wheeltest/bin/openagent --help
          /tmp/wheeltest/bin/openagent version

      - name: Upload distributions
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  # Textual Select-sentinel compatibility (spec: no Textual "no selection" sentinel may cross the
  # screen/service boundary). The empty-value normalisation is version-independent by design — it
  # keys off "is the value a str?", not a sentinel name — so it survives the Select.BLANK→Select.NULL
  # rename. This job pins the exact Textual versions we have exercised end-to-end and runs the
  # sentinel + Add-Agent interaction tests against each.
  textual-compat:
    name: textual-compat (${{ matrix.textual }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        textual: ["8.2.8"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install with pinned Textual ${{ matrix.textual }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install "textual==${{ matrix.textual }}"
          python -c "import textual; print('textual', textual.__version__)"

      - name: TUI interaction tests (Run Console, wizard, modals, Select sentinel)
        run: >
          pytest -q
          tests/unit/test_select_utils.py
          tests/unit/test_agent_service_validation.py
          tests/unit/test_wizard_state.py
          tests/unit/test_tui_add_agent.py
          tests/unit/test_tui_provider.py
          tests/unit/test_tui_modals.py
          tests/unit/test_tui_live_retention.py
          tests/unit/test_tui_responsive.py
          tests/unit/test_markup_safety.py
          tests/unit/test_projection.py
          tests/integration/test_tui_run.py
          tests/integration/test_tui_ask_user.py

  container-sandbox:
    name: container-sandbox (real Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: python -m pip install -e ".[dev]"

      # CI explicitly provisions the local image. The OpenAgent backend itself is then tested with
      # pulls/builds disabled and receives only this already-present image name.
      - name: Provision local Linux sandbox image
        run: docker build -t openagent-sandbox-ci tests/fixtures/container

      - name: Exercise no-network tmpfs sandbox through the real service backend
        env:
          OPENAGENT_REAL_CONTAINER: "1"
          OPENAGENT_CONTAINER_RUNTIME: docker
          OPENAGENT_CONTAINER_IMAGE: openagent-sandbox-ci
        run: pytest -q -m container tests/integration/test_container_sandbox_real.py

  wheel-lifecycle:
    name: wheel fresh + ${{ matrix.legacy-name }} upgrade/backup restore
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - legacy-name: v0.1.2
            legacy-ref: v0.1.2
          # v0.1.3 was released from this immutable commit without a repository tag.
          - legacy-name: v0.1.3
            legacy-ref: bb5a67a31d707fa947adbb5d6b192ed1138980cc
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build current and legacy wheels
        run: |
          python -m pip install --upgrade pip build
          python -m build --outdir "$RUNNER_TEMP/current-dist"
          mkdir -p "$RUNNER_TEMP/legacy-src" "$RUNNER_TEMP/legacy-dist"
          git archive "${{ matrix.legacy-ref }}" | tar -x -C "$RUNNER_TEMP/legacy-src"
          python -m build "$RUNNER_TEMP/legacy-src" --outdir "$RUNNER_TEMP/legacy-dist"

      - name: Fresh current-wheel install in a sandbox HOME
        run: |
          python -m venv "$RUNNER_TEMP/fresh"
          "$RUNNER_TEMP/fresh/bin/pip" install "$RUNNER_TEMP"/current-dist/*.whl
          mkdir -p "$RUNNER_TEMP/fresh-home" "$RUNNER_TEMP/fresh-data" "$RUNNER_TEMP/fresh-config"
          HOME="$RUNNER_TEMP/fresh-home" OPENAGENT_DATA_DIR="$RUNNER_TEMP/fresh-data" \
            OPENAGENT_CONFIG_DIR="$RUNNER_TEMP/fresh-config" \
            "$RUNNER_TEMP/fresh/bin/openagent" version

      - name: Create a real legacy DB, upgrade it, and reopen its online backup copy
        run: |
          python -m venv "$RUNNER_TEMP/upgrade"
          "$RUNNER_TEMP/upgrade/bin/pip" install "$RUNNER_TEMP"/legacy-dist/*.whl
          mkdir -p "$RUNNER_TEMP/upgrade-home" "$RUNNER_TEMP/upgrade-data" \
            "$RUNNER_TEMP/upgrade-config" "$RUNNER_TEMP/legacy-project"
          export HOME="$RUNNER_TEMP/upgrade-home"
          export OPENAGENT_DATA_DIR="$RUNNER_TEMP/upgrade-data"
          export OPENAGENT_CONFIG_DIR="$RUNNER_TEMP/upgrade-config"
          export LEGACY_PROJECT="$RUNNER_TEMP/legacy-project"
          "$RUNNER_TEMP/upgrade/bin/python" - <<'PY'
          import os
          from pathlib import Path
          from openagent.app import OpenAgentApp
          from openagent.core.models import RuntimeType
          app = OpenAgentApp.create(Path(os.environ["LEGACY_PROJECT"]))
          app.agents.create(name="legacy-agent", runtime_type=RuntimeType.CLI, cli="codex")
          PY
          "$RUNNER_TEMP/upgrade/bin/pip" install --upgrade --force-reinstall \
            "$RUNNER_TEMP"/current-dist/*.whl
          "$RUNNER_TEMP/upgrade/bin/python" - <<'PY'
          import os
          from pathlib import Path
          from openagent.app import OpenAgentApp
          app = OpenAgentApp.create(Path(os.environ["LEGACY_PROJECT"]))
          assert app.agents.get("legacy-agent") is not None
          PY
          backup=$(find "$RUNNER_TEMP/upgrade-data" -name '*.bak' -print -quit)
          test -n "$backup"
          cp "$backup" "$RUNNER_TEMP/restored.db"
          RESTORED_DB="$RUNNER_TEMP/restored.db" "$RUNNER_TEMP/upgrade/bin/python" - <<'PY'
          import os
          from pathlib import Path
          from openagent.storage.db import Database
          from openagent.storage.migrations import LATEST_VERSION, current_version
          db = Database.open(Path(os.environ["RESTORED_DB"]))
          with db.engine.begin() as conn:
              assert current_version(conn) == LATEST_VERSION
              assert conn.exec_driver_sql("SELECT COUNT(*) FROM agents").scalar() == 1
          PY

  # Cross-platform smoke: install, build, entrypoint, and the platform-sensitive smoke tests
  # (path handling, process management, keyring fallback, TUI import/startup).
  smoke:
    name: smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install (editable, with dev extras)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" build

      - name: Cross-platform smoke tests
        run: pytest -q tests/smoke

      - name: CLI entrypoint
        run: |
          openagent --help
          openagent version

      - name: Build package
        run: python -m build

  # Real installer jobs (§5). These deliberately do NOT use actions/setup-python — the point is to
  # simulate a machine where the user has not installed Python, and prove setup.sh / setup.bat bring
  # their own managed Python via uv. They need network access (uv + managed Python + PyPI), so they
  # are a separate, clearly named job. uv's tool/python dirs are redirected into RUNNER_TEMP so the
  # runner's real environment is not polluted.
  installer-unix:
    name: installer (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    env:
      OPENAGENT_SETUP_NO_LAUNCH: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Isolate uv directories
        run: |
          {
            echo "UV_TOOL_DIR=$RUNNER_TEMP/uv/tools"
            echo "UV_TOOL_BIN_DIR=$RUNNER_TEMP/uv/bin"
            echo "UV_PYTHON_INSTALL_DIR=$RUNNER_TEMP/uv/py"
            echo "OPENAGENT_DATA_DIR=$RUNNER_TEMP/installer-data"
            echo "OPENAGENT_CONFIG_DIR=$RUNNER_TEMP/installer-config"
          } >> "$GITHUB_ENV"

      - name: First install (setup.sh, no TUI launch)
        run: bash setup.sh

      - name: Verify openagent, managed Python, and parseable doctor JSON
        run: |
          export PATH="$UV_TOOL_BIN_DIR:$PATH"
          openagent version
          # doctor may exit non-zero (missing optional CLIs) but must emit parseable JSON.
          openagent doctor --json > doctor.json || true
          python3 -c "import json; json.load(open('doctor.json')); print('doctor json ok')"
          # Managed Python was installed by uv — no dependency on a system Python.
          ls "$UV_PYTHON_INSTALL_DIR" | grep -i cpython

      - name: Installer created no .venv in the repo
        run: test ! -d .venv

      - name: Second install (update / idempotency)
        run: bash setup.sh

      - name: Older PATH binary is repaired, never accepted as a warning
        run: |
          mkdir -p "$RUNNER_TEMP/old-openagent"
          printf '#!/bin/sh\nprintf "openagent 0.0.1\\n"\n' > "$RUNNER_TEMP/old-openagent/openagent"
          chmod +x "$RUNNER_TEMP/old-openagent/openagent"
          PATH="$RUNNER_TEMP/old-openagent:$PATH" bash setup.sh > "$RUNNER_TEMP/old-path.log"
          grep "PATH: $UV_TOOL_BIN_DIR/openagent" "$RUNNER_TEMP/old-path.log"

      - name: Install from a path containing spaces
        run: |
          dest="$RUNNER_TEMP/Open Agent Test"
          rm -rf "$dest"; mkdir -p "$dest"
          cp -R . "$dest/"
          rm -rf "$dest/.venv"
          UV_TOOL_DIR="$RUNNER_TEMP/uv2/tools" UV_TOOL_BIN_DIR="$RUNNER_TEMP/uv2/bin" \
            bash "$dest/setup.sh"
          "$RUNNER_TEMP/uv2/bin/openagent" version

      - name: Installer blocks future schema, broken JSON, and failed migration
        if: matrix.os == 'ubuntu-latest'
        run: |
          tool_python="$UV_TOOL_DIR/openagent/bin/python"
          fixture_project="$RUNNER_TEMP/installer-fixture-project"
          mkdir -p "$fixture_project"
          FIXTURE_PROJECT="$fixture_project" "$tool_python" - <<'PY'
          import os
          from pathlib import Path
          from sqlalchemy import text
          from openagent.app import OpenAgentApp
          from openagent.core.models import RuntimeType

          root = Path(os.environ["FIXTURE_PROJECT"])
          cases = {
              "future": Path(os.environ["RUNNER_TEMP"]) / "installer-future",
              "broken": Path(os.environ["RUNNER_TEMP"]) / "installer-broken",
              "migration": Path(os.environ["RUNNER_TEMP"]) / "installer-migration",
          }
          for name, data in cases.items():
              os.environ["OPENAGENT_DATA_DIR"] = str(data)
              os.environ["OPENAGENT_CONFIG_DIR"] = str(data / "config")
              app = OpenAgentApp.create(root / name)
              if name in {"broken", "migration"}:
                  app.agents.create(
                      name=f"{name}-agent",
                      runtime_type=RuntimeType.CLI,
                      cli="codex",
                  )
                  with app.db.engine.begin() as conn:
                      conn.execute(
                          text("UPDATE agents SET data=:data WHERE name=:name"),
                          {"data": '{"name":', "name": f"{name}-agent"},
                      )
              if name == "future":
                  with app.db.engine.begin() as conn:
                      conn.execute(
                          text("UPDATE schema_meta SET value='999' WHERE key='version'")
                      )
              if name == "migration":
                  with app.db.engine.begin() as conn:
                      conn.execute(
                          text("UPDATE schema_meta SET value='0010' WHERE key='revision'")
                      )
                      conn.execute(
                          text("UPDATE schema_meta SET value='10' WHERE key='version'")
                      )
          PY
          if OPENAGENT_DATA_DIR="$RUNNER_TEMP/installer-future" \
             OPENAGENT_CONFIG_DIR="$RUNNER_TEMP/installer-future/config" \
             bash setup.sh >"$RUNNER_TEMP/future.log" 2>&1; then
            echo "future schema unexpectedly passed"; exit 1
          fi
          grep "stage : verify-database" "$RUNNER_TEMP/future.log"
          if OPENAGENT_DATA_DIR="$RUNNER_TEMP/installer-broken" \
             OPENAGENT_CONFIG_DIR="$RUNNER_TEMP/installer-broken/config" \
             bash setup.sh >"$RUNNER_TEMP/broken.log" 2>&1; then
            echo "broken JSON unexpectedly passed"; exit 1
          fi
          grep "stage : verify-database" "$RUNNER_TEMP/broken.log"
          if OPENAGENT_DATA_DIR="$RUNNER_TEMP/installer-migration" \
             OPENAGENT_CONFIG_DIR="$RUNNER_TEMP/installer-migration/config" \
             bash setup.sh >"$RUNNER_TEMP/migration.log" 2>&1; then
            echo "failed migration unexpectedly passed"; exit 1
          fi
          grep "database backup:" "$RUNNER_TEMP/migration.log"
          grep "stage : verify-migration" "$RUNNER_TEMP/migration.log"

  installer-windows:
    name: installer (windows-latest, ${{ matrix.shell }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      # setup.bat is documented for BOTH shells (`setup.bat` from CMD, `.\setup.bat` from
      # PowerShell), so both invocations are verified — a PowerShell-only quoting or exit-code bug
      # would otherwise ship unnoticed (spec §7.4).
      matrix:
        shell: [cmd, powershell]
    env:
      OPENAGENT_SETUP_NO_LAUNCH: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Isolate uv directories
        shell: cmd
        run: |
          echo UV_TOOL_DIR=%RUNNER_TEMP%\uv\tools>> "%GITHUB_ENV%"
          echo UV_TOOL_BIN_DIR=%RUNNER_TEMP%\uv\bin>> "%GITHUB_ENV%"
          echo UV_PYTHON_INSTALL_DIR=%RUNNER_TEMP%\uv\py>> "%GITHUB_ENV%"

      - name: First install through CMD (setup.bat, no TUI launch)
        if: matrix.shell == 'cmd'
        shell: cmd
        run: setup.bat

      - name: First install through PowerShell (.\setup.bat, no TUI launch)
        if: matrix.shell == 'powershell'
        shell: powershell
        run: |
          .\setup.bat
          if ($LASTEXITCODE -ne 0) { exit 1 }

      # The installer itself already proves a *fresh* CMD and PowerShell can run `openagent` from
      # the PERSISTED (registry) PATH, with no manual tool-bin injection (spec §7.3). This job
      # re-asserts it independently of the installer's own check, from this step's environment.
      - name: Fresh CMD + PowerShell find openagent via the persisted PATH
        shell: powershell
        run: |
          $machine = [Environment]::GetEnvironmentVariable('Path', 'Machine')
          $user = [Environment]::GetEnvironmentVariable('Path', 'User')
          if (-not ($user -split ';' | Where-Object { $_ -and $_.TrimEnd('\') -ieq $env:UV_TOOL_BIN_DIR.TrimEnd('\') })) {
            Write-Error "the tool dir was not persisted to the user PATH"; exit 1
          }
          # Compose the PATH a brand-new login shell would get, and use ONLY that.
          $env:Path = (@($machine, $user) | Where-Object { $_ }) -join ';'
          cmd /d /c "openagent version"
          if ($LASTEXITCODE -ne 0) { Write-Error "fresh CMD could not run openagent"; exit 1 }
          & openagent version
          if ($LASTEXITCODE -ne 0) { Write-Error "fresh PowerShell could not run openagent"; exit 1 }

      - name: Verify openagent and parseable doctor JSON
        shell: cmd
        run: |
          set "PATH=%UV_TOOL_BIN_DIR%;%PATH%"
          openagent version || exit /b 1
          openagent doctor --json > doctor.json
          python -c "import json;json.load(open('doctor.json'));print('doctor json ok')" || exit /b 1

      - name: Installer created no .venv in the repo
        shell: cmd
        run: if exist .venv exit /b 1

      - name: Second install (update / idempotency)
        shell: cmd
        run: setup.bat

      - name: Install from a path containing spaces
        shell: cmd
        run: |
          set "DEST=%RUNNER_TEMP%\Open Agent Test"
          if exist "%DEST%" rmdir /s /q "%DEST%"
          xcopy /E /I /Q /Y "%CD%" "%DEST%" >nul
          if exist "%DEST%\.venv" rmdir /s /q "%DEST%\.venv"
          set "UV_TOOL_DIR=%RUNNER_TEMP%\uv2\tools"
          set "UV_TOOL_BIN_DIR=%RUNNER_TEMP%\uv2\bin"
          call "%DEST%\setup.bat" || exit /b 1
          "%RUNNER_TEMP%\uv2\bin\openagent.exe" version || exit /b 1

  installer-powershell:
    name: installer (windows-latest, setup.ps1)
    runs-on: windows-latest
    env:
      OPENAGENT_SETUP_NO_LAUNCH: "1"
    steps:
      - uses: actions/checkout@v4

      # No actions/setup-python: setup.ps1 must bootstrap uv's managed Python itself.
      - name: Isolate uv directories
        shell: powershell
        run: |
          "UV_TOOL_DIR=$env:RUNNER_TEMP\uv-ps\tools" | Out-File $env:GITHUB_ENV -Append
          "UV_TOOL_BIN_DIR=$env:RUNNER_TEMP\uv-ps\bin" | Out-File $env:GITHUB_ENV -Append
          "UV_PYTHON_INSTALL_DIR=$env:RUNNER_TEMP\uv-ps\py" | Out-File $env:GITHUB_ENV -Append

      - name: First PowerShell install and persisted-PATH verification
        shell: powershell
        run: .\setup.ps1

      - name: Second install is an idempotent upgrade
        shell: powershell
        run: .\setup.ps1

      - name: Install from a path containing spaces
        shell: powershell
        run: |
          $destination = Join-Path $env:RUNNER_TEMP "Open Agent PowerShell Test"
          Remove-Item -LiteralPath $destination -Recurse -Force -ErrorAction SilentlyContinue
          Copy-Item -LiteralPath $PWD -Destination $destination -Recurse
          Remove-Item -LiteralPath (Join-Path $destination ".venv") -Recurse -Force -ErrorAction SilentlyContinue
          $env:UV_TOOL_DIR = "$env:RUNNER_TEMP\uv-ps2\tools"
          $env:UV_TOOL_BIN_DIR = "$env:RUNNER_TEMP\uv-ps2\bin"
          $env:UV_PYTHON_INSTALL_DIR = "$env:RUNNER_TEMP\uv-ps2\py"
          & (Join-Path $destination "setup.ps1")
          if ($LASTEXITCODE -ne 0) { exit 1 }
          & "$env:UV_TOOL_BIN_DIR\openagent.exe" version
          if ($LASTEXITCODE -ne 0) { exit 1 }
