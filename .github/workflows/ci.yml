name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Full lint + type-check + offline test suite + package build on Linux.
  test:
    name: test (ubuntu, py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (editable, with dev extras)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" build

      - name: Ruff
        run: ruff check src tests

      - name: Mypy
        run: mypy src

      - name: Pytest (offline suite — no API keys, no live CLIs)
        run: pytest -q

      - name: Build sdist + wheel
        run: python -m build

      - name: Install the built wheel in a clean venv and smoke the entrypoint
        run: |
          python -m venv /tmp/wheeltest
          /tmp/wheeltest/bin/python -m pip install --upgrade pip
          /tmp/wheeltest/bin/pip install dist/*.whl
          /tmp/wheeltest/bin/openagent --help
          /tmp/wheeltest/bin/openagent version

      - name: Upload distributions
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  # Textual Select-sentinel compatibility (spec: no Textual "no selection" sentinel may cross the
  # screen/service boundary). The empty-value normalisation is version-independent by design — it
  # keys off "is the value a str?", not a sentinel name — so it survives the Select.BLANK→Select.NULL
  # rename. This job pins the exact Textual versions we have exercised end-to-end and runs the
  # sentinel + Add-Agent interaction tests against each.
  textual-compat:
    name: textual-compat (${{ matrix.textual }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        textual: ["8.2.8"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install with pinned Textual ${{ matrix.textual }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install "textual==${{ matrix.textual }}"
          python -c "import textual; print('textual', textual.__version__)"

      - name: TUI interaction tests (Run Console, wizard, modals, Select sentinel)
        run: >
          pytest -q
          tests/unit/test_select_utils.py
          tests/unit/test_agent_service_validation.py
          tests/unit/test_wizard_state.py
          tests/unit/test_tui_add_agent.py
          tests/unit/test_tui_provider.py
          tests/unit/test_tui_modals.py
          tests/unit/test_markup_safety.py
          tests/unit/test_projection.py
          tests/integration/test_tui_run.py
          tests/integration/test_tui_ask_user.py

  # Cross-platform smoke: install, build, entrypoint, and the platform-sensitive smoke tests
  # (path handling, process management, keyring fallback, TUI import/startup).
  smoke:
    name: smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install (editable, with dev extras)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" build

      - name: Cross-platform smoke tests
        run: pytest -q tests/smoke

      - name: CLI entrypoint
        run: |
          openagent --help
          openagent version

      - name: Build package
        run: python -m build
